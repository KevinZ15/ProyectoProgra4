{% extends 'base.html' %}
{% block content %}
<!-- Formulario de datos adicionales del cliente tras el registro -->
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card bg-dark text-white">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">Formulario de Nuevo Cliente</h2>

                <!-- Campos obligatorios del perfil del cliente -->
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Teléfono</label>
                        <input type="text" name="telefono" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dirección</label>
                        <input type="text" name="direccion" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Ocupación</label>
                        <input type="text" name="ocupacion" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Fecha de Nacimiento</label>
                        <input type="date" name="fecha_nacimiento" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3">Guardar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
